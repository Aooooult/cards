<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Quiz - All Categories</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #2e7d32;
            --error-color: #c62828;
            --success-color: #2e7d32;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.8rem;
        }
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            max-width: 800px;
        }
        .tab-btn {
            background-color: #fff;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .tab-btn.active, .tab-btn:hover {
            background-color: var(--accent-color);
            color: white;
        }
        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .progress-container {
            width: 100%;
            margin-bottom: 20px;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar-bg {
            background-color: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .card-display {
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            border-radius: 8px;
            padding: 10px;
        }
        .lang-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #95a5a6;
            margin-bottom: 10px;
        }
        .word-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.4;
        }
        .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .answer-input {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            transition: border-color 0.3s;
        }
        .answer-input:focus {
            border-color: var(--accent-color);
        }
        .action-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .action-btn:hover {
            opacity: 0.9;
        }
        .feedback {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 50px;
        }
        .feedback.success { color: var(--success-color); }
        .feedback.error { color: var(--error-color); }
        
        .correct-answer {
            font-size: 0.95rem;
            font-weight: normal;
            color: #555;
            margin-top: 5px;
        }
        .success-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <h1>Тренажёр карточек</h1>
    
    <div class="nav-tabs" id="tabs">
        <button class="tab-btn active" onclick="changeCategory('all')">Все слова</button>
        <button class="tab-btn" onclick="changeCategory('environment')">Environment</button>
        <button class="tab-btn" onclick="changeCategory('hometown')">My Hometown</button>
        <button class="tab-btn" onclick="changeCategory('house')">My House</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-box">
            <div class="progress-container">
                <div class="progress-text">
                    <span>Прогресс категории:</span>
                    <span id="progress-count">0 / 0</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <div class="card-display" id="card-display">
                <div class="lang-label">Как это на английском?</div>
                <div class="word-text" id="ru-word">Загрузка...</div>
            </div>

            <div class="input-group">
                <input type="text" id="answer-input" class="answer-input" placeholder="Введите перевод по-английски" autocomplete="off">
                <button id="submit-btn" class="action-btn" onclick="checkAnswer()">Проверить</button>
            </div>

            <div id="feedback" class="feedback"></div>
        </div>
        
        <div id="success-box" class="success-screen" style="display: none;">
            <h2>🎉 Отличная работа!</h2>
            <p>Ты успешно выучил все выбранные слова!</p>
            <button class="action-btn" onclick="restartCategory()">Пройти заново</button>
        </div>
    </div>

        let currentCategory = 'all';
        let currentDeck = [];
        let totalInSession = 0;
        let learnedCount = 0;
        let isShowingAnswer = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            if (currentCategory === 'all') {
                currentDeck = [...allWords];
            } else {
                currentDeck = allWords.filter(w => w.cat === currentCategory);
            }
            shuffle(currentDeck);
            totalInSession = currentDeck.length;
            learnedCount = 0;
            isShowingAnswer = false;
            
            document.getElementById('quiz-box').style.display = 'block';
            document.getElementById('success-box').style.display = 'none';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('answer-input').value = '';
            document.getElementById('submit-btn').innerText = "Проверить";
            
            updateProgress();
            showNextCard();
        }

        function showNextCard() {
            if (currentDeck.length === 0) {
                document.getElementById('quiz-box').style.display = 'none';
                document.getElementById('success-box').style.display = 'flex';
                return;
            }
            const currentCard = currentDeck[0];
            document.getElementById('ru-word').innerText = currentCard.ru;
            document.getElementById('card-display').style.backgroundColor = '#ffffff';
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').disabled = false;
            document.getElementById('answer-input').focus();
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('submit-btn').innerText = "Проверить";
            isShowingAnswer = false;
        }

        function checkAnswer() {
            if (currentDeck.length === 0) return;

            const inputField = document.getElementById('answer-input');
            const feedbackField = document.getElementById('feedback');
            const cardDisplay = document.getElementById('card-display');
            const submitBtn = document.getElementById('submit-btn');

            if (isShowingAnswer) {
                showNextCard();
                return;
            }

            const userAnswer = inputField.value.trim().toLowerCase();
            const correctAnswers = currentDeck[0].en.split('/').map(ans => ans.trim().toLowerCase());
            
            let isCorrect = false;
            correctAnswers.forEach(correct => {
                if (userAnswer === correct || currentDeck[0].en.toLowerCase().trim() === userAnswer || 
                    currentDeck[0].en.toLowerCase().trim().replace('to ', '') === userAnswer) {
                    isCorrect = true;
                }
            });

            inputField.disabled = true;

            if (isCorrect) {
                feedbackField.className = "feedback success";
                feedbackField.innerHTML = "✨ Правильно!";
                cardDisplay.style.backgroundColor = "#e8f5e9";
                
                currentDeck.shift();
                learnedCount++;
                updateProgress();
                
                setTimeout(showNextCard, 1200);
            } else {
                feedbackField.className = "feedback error";
                feedbackField.innerHTML = `❌ Ошибка!<div class="correct-answer">Правильный ответ: <strong>${currentDeck[0].en}</strong></div>`;
                cardDisplay.style.backgroundColor = "#ffebee";
                
                const failedCard = currentDeck.shift();
                currentDeck.push(failedCard);
                
                submitBtn.innerText = "Дальше";
                isShowingAnswer = true;
            }
        }

        function updateProgress() {
            document.getElementById('progress-count').innerText = `${learnedCount} / ${totalInSession}`;
            const percentage = totalInSession > 0 ? (learnedCount / totalInSession) * 100 : 0;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function changeCategory(category) {
            currentCategory = category;
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            initQuiz();
        }

        function restartCategory() {
            initQuiz();
        }

        document.getElementById('answer-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        window.onload = initQuiz;
    </script>
</body>
</html>
